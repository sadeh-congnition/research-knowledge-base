{% extends "core/base.html" %}

{% block content %}
<h2>Project: {{ project.name }}</h2>
<p>{{ project.description }}</p>

<h3>Visualization</h3>
<div id="visualization"></div>

<script>
    function initGraph() {
        fetch('/api/project/{{ project.id }}/graph')
            .then(res => res.json())
            .then(elements => {
                var cy = cytoscape({
                    container: document.getElementById('visualization'),
                    elements: elements,
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'label': 'data(label)',
                                'background-color': '#007bff',
                                'color': '#fff',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'width': '80px',
                                'height': '80px',
                                'font-size': '12px',
                                'text-wrap': 'wrap',
                                'text-max-width': '75px'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 3,
                                'line-color': '#ccc',
                                'target-arrow-color': '#ccc',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier'
                            }
                        }
                    ],
                    layout: {
                        name: 'cose',
                        padding: 10
                    }
                });

                cy.on('tap', 'node', function (evt) {
                    var node = evt.target;
                    window.location.href = '/nodes/' + node.id() + '/';
                });
            });
    }

    document.addEventListener('DOMContentLoaded', initGraph);
    document.addEventListener('htmx:afterOnLoad', function (evt) {
        if (evt.detail.target.id === 'node-list' || evt.detail.target.id === 'visualization') {
            initGraph();
        }
    });
</script>

<div style="display: flex; gap: 20px;">
    <div style="flex: 1;">
        <h3>Nodes</h3>
        <div id="node-list">
            {% for node in project.nodes.all %}
            <div class="node-card">
                <h4><a href="{% url 'node_detail' node.pk %}">{{ node.title }}</a></h4>
                <p>{{ node.content|truncatewords:20 }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <div style="flex: 1;">
        <h3>Add New Node</h3>
        <form hx-post="{% url 'node_create' project.pk %}" hx-target="#node-list" hx-swap="beforeend">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Node Title" required>
            <div class="node-textarea-wrapper">
                <textarea name="content" placeholder="Node Content (you can mention other nodes like [[NodeTitle]])"
                    oninput="handleNodeInput(event)"></textarea>
                <input type="hidden" id="node-search-query" name="q" value=""
                    hx-get="/api/project/{{ project.id }}/nodes/search" hx-trigger="search"
                    hx-target="#autocomplete-results" hx-swap="outerHTML" hx-select="#autocomplete-results"
                    hx-params="q">
                <div id="autocomplete-results" class="autocomplete-results" style="display: none;"></div>
            </div>
            <button type="submit">Add Node</button>
        </form>
    </div>
</div>
{% endblock %}
