<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Knowledge Base</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.0/cytoscape.min.js"></script>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; }
        .project-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        .node-card { border: 1px solid #eee; padding: 10px; margin-bottom: 10px; }
        #visualization { width: 100%; height: 400px; border: 1px solid #ccc; margin-bottom: 20px; background: #fafafa; }
        form { margin-bottom: 20px; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
    </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="container">
        <header>
            <h1><a href="/" style="text-decoration: none; color: inherit;">Research Knowledge Base</a></h1>
        </header>
        <main id="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
