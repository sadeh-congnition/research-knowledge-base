<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Knowledge Base</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.0/cytoscape.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: #050505;
            color: #f0f0f0;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #0f0f0f;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
        }

        h1,
        h2,
        h3,
        h4 {
            color: #00ffcc;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.2);
        }

        a {
            color: #33ccff;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #00ffcc;
            text-decoration: underline;
        }

        .project-card {
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #1a1a1a;
            box-shadow: 3px 3px 0px #00ffcc;
        }

        .node-card {
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border-left: 4px solid #ff00ff;
        }

        #visualization {
            width: 100%;
            height: 450px;
            border: 1px solid #333;
            margin-bottom: 25px;
            background: #000;
            border-radius: 8px;
        }

        form {
            margin-bottom: 25px;
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            background: #000;
            color: #00ffcc;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #00ffcc;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background: #ff00ff;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: #cc00cc;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .hidden {
            display: none;
        }

        .autocomplete-results {
            position: absolute;
            z-index: 1000;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            top: calc(100% - 8px);
            left: 0;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            color: #00ffcc;
            border-bottom: 1px solid #333;
        }

        .autocomplete-item:hover {
            background: #333;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .node-textarea-wrapper {
            position: relative;
        }
    </style>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="container">
        <header>
            <h1><a href="/" style="text-decoration: none; color: inherit;">Research Knowledge Base</a></h1>
        </header>
        <main id="content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        let activeTextarea = null;

        function handleNodeInput(event) {
            const textarea = event.target;
            activeTextarea = textarea;
            const text = textarea.value;
            const cursorPosition = textarea.selectionStart;

            // Look for [[ preceding the cursor
            const textBeforeCursor = text.substring(0, cursorPosition);
            const match = textBeforeCursor.match(/\[\[([^\]]*)$/);

            const wrapper = textarea.closest('.node-textarea-wrapper');
            if (!wrapper) return;

            const resultsDiv = wrapper.querySelector('#autocomplete-results');
            const searchInput = wrapper.querySelector('#node-search-query');

            if (match) {
                const query = match[1];
                searchInput.value = query;
                htmx.trigger(searchInput, 'search');
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.style.display = 'none';
            }
        }

        function selectAutocomplete(title) {
            if (!activeTextarea) return;

            const text = activeTextarea.value;
            const cursorPosition = activeTextarea.selectionStart;
            const textBeforeCursor = text.substring(0, cursorPosition);
            const textAfterCursor = text.substring(cursorPosition);

            const match = textBeforeCursor.match(/\[\[([^\]]*)$/);

            if (match) {
                const index = match.index;
                const newTextBeforeCursor = textBeforeCursor.substring(0, index) + '[[' + title + ']] ';
                activeTextarea.value = newTextBeforeCursor + textAfterCursor;

                // Set cursor position after the newly inserted link
                activeTextarea.selectionStart = newTextBeforeCursor.length;
                activeTextarea.selectionEnd = newTextBeforeCursor.length;
                activeTextarea.focus();
            }

            const wrapper = activeTextarea.closest('.node-textarea-wrapper');
            if (wrapper) {
                const resultsDiv = wrapper.querySelector('#autocomplete-results');
                resultsDiv.style.display = 'none';
            }
        }
    </script>
</body>

</html>
